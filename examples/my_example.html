<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <!-- Importante: usa los scripts del servidor -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/easyrtc/easyrtc.js"></script>

    <script src="https://unpkg.com/networked-aframe@^0.14.0/dist/networked-aframe.min.js"></script>

    <script>
      AFRAME.registerComponent("spawn-in-circle", {
        schema: { radius: { type: "number", default: 1 } },
        init: function () {
          const center = this.el.getAttribute("position") || { x: 0, y: 0, z: 0 };
          const angleRad = Math.random() * Math.PI * 2;
          const x = Math.cos(angleRad) * this.data.radius + center.x;
          const z = Math.sin(angleRad) * this.data.radius + center.z;
          this.el.setAttribute("position", { x, y: center.y, z });
        },
      });
    </script>
  </head>

  <body>
    <a-scene
      networked-scene="
        room: room1;
        adapter: easyrtc;
        debug: true;
      "
    >
      <a-assets>
        <template id="avatar-template">
          <a-entity class="avatar">
            <a-sphere color="#5985ff" scale="0.45 0.5 0.4"></a-sphere>
          </a-entity>
        </template>
      </a-assets>

      <!-- Cámara local -->
      <a-entity
        id="player"
        networked="template:#avatar-template; attachTemplateToLocal:false;"
        camera
        position="0 1.6 3"
        wasd-controls
        look-controls
        spawn-in-circle="radius:3"
      ></a-entity>

      <!-- Algo visible seguro -->
      <a-plane rotation="-90 0 0" width="20" height="20" color="#2a2a2a"></a-plane>
      <a-box position="0 1 -3" depth="1" height="1" width="1" color="#ff4455"></a-box>
      <a-sky color="#111"></a-sky>

      <a-entity light="type: ambient; intensity: 0.6"></a-entity>
      <a-entity light="type: directional; intensity: 1" position="1 3 2"></a-entity>
    </a-scene>
  </body>
</html>
