<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Data Visualization Room — Collaborative VR</title>
    <meta name="description" content="Immersive 3D data visualization for collaborative meetings in VR">
    <link rel="icon" type="image/png" href="../assets/images/MiLogoVR.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- A-Frame & extensions -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- WORKAROUND: Remove built-in A-Frame 1.5+ grabbable to avoid
         conflict with superhands' grabbable component -->
    <script>delete AFRAME.components["grabbable"];</script>

    <!-- Networking -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <script src="/easyrtc/easyrtc.js"></script>
    <script src="/js/networked-aframe.js"></script>
    <script src="/js/easyrtc-patch.js"></script>

    <!-- BabiaXR -->
    <script src="https://unpkg.com/aframe-babia-components/dist/aframe-babia-components.min.js"></script>

    <!-- A-Frame extras (sphere-collider, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <!-- Superhands — Natural VR interaction -->
    <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>

    <link rel="stylesheet" href="../css/babia.css">
</head>

<body>

    <!-- ══════════════════════════════════════════
         DATASET INFO PANEL (HUD — top left)
         ══════════════════════════════════════════ -->
    <div id="dataset-panel">
        <div class="dataset-header">
            <div class="dataset-dot"></div>
            <span class="dataset-label">Active Dataset</span>
        </div>
        <h3 id="dataset-title">Quarterly Sales Overview</h3>
        <p id="dataset-desc">Comparative sales data by department across Q1–Q4. Explore the 3D bar chart to compare performance.</p>
    </div>

    <!-- ══════════════════════════════════════════
         SESSION BADGE (HUD — top right)
         ══════════════════════════════════════════ -->
    <div id="session-badge">
        <div class="badge-time" id="badge-time">--:--</div>
        <div class="badge-date" id="badge-date">Loading...</div>
        <div class="badge-session">
            <span class="session-dot"></span>
            Session: <span id="badge-session">0:00</span>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         PRESET DOCK (HUD — bottom center)
         ══════════════════════════════════════════ -->
    <div id="preset-dock">
        <button class="dock-item active" data-preset="sales">
            <span class="dock-icon">📊</span>
            <span class="dock-label">Sales</span>
        </button>
        <button class="dock-item" data-preset="attendance">
            <span class="dock-icon">👥</span>
            <span class="dock-label">Attendance</span>
        </button>
        <button class="dock-item" data-preset="kpis">
            <span class="dock-icon">💰</span>
            <span class="dock-label">KPIs</span>
        </button>
    </div>

    <!-- ══════════════════════════════════════════
         A-FRAME SCENE
         ══════════════════════════════════════════ -->
    <a-scene networked-scene="
        room: babia-data-room;
        debug: true;
        adapter: easyrtc;
        audio: true;
        serverURL: /;
    ">

        <a-assets>
            <!-- Avatar template -->
            <template id="avatar-template">
                <a-entity class="avatar">
                    <a-entity class="player-cam" networked-audio-source>
                        <a-entity class="visual-model"
                            animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true; to: 0 0.1 0">
                            <a-sphere class="head" scale="0.3 0.3 0.3"></a-sphere>
                            <a-entity class="face" position="0 0.05 0">
                                <a-sphere class="eye" color="#efefef" position="0.1 0.1 -0.2"
                                    scale="0.08 0.08 0.08">
                                    <a-sphere class="pupil" color="#000" position="0 0 -1"
                                        scale="0.2 0.2 0.2"></a-sphere>
                                </a-sphere>
                                <a-sphere class="eye" color="#efefef" position="-0.1 0.1 -0.2"
                                    scale="0.08 0.08 0.08">
                                    <a-sphere class="pupil" color="#000" position="0 0 -1"
                                        scale="0.2 0.2 0.2"></a-sphere>
                                </a-sphere>
                            </a-entity>
                        </a-entity>
                        <a-entity class="nametag-container" position="0 0.6 0" look-at="[camera]">
                            <a-text class="nametag" value="Anonymous" color="white" align="center"
                                scale="1.5 1.5 1.5" side="double"></a-text>
                        </a-entity>
                    </a-entity>
                </a-entity>
            </template>
        </a-assets>

        <!-- ==================== ENVIRONMENT ==================== -->

        <!-- Sky: Deep dark -->
        <a-sky color="#08090c"></a-sky>

        <!-- Main Platform: Dark reflective rectangle (boardroom style) -->
        <a-plane position="0 0 -4" rotation="-90 0 0" width="28" height="20"
            material="color: #0a0a0c; metalness: 0.95; roughness: 0.12; envMap: #; side: double">
        </a-plane>

        <!-- Platform edge glow — front -->
        <a-box position="0 0.01 6" width="28" height="0.02" depth="0.04"
            material="color: #2997ff; emissive: #2997ff; emissiveIntensity: 0.3; opacity: 0.4; transparent: true">
        </a-box>
        <!-- Platform edge glow — back -->
        <a-box position="0 0.01 -14" width="28" height="0.02" depth="0.04"
            material="color: #2997ff; emissive: #2997ff; emissiveIntensity: 0.2; opacity: 0.25; transparent: true">
        </a-box>
        <!-- Platform edge glow — left -->
        <a-box position="-14 0.01 -4" width="0.04" height="0.02" depth="20"
            material="color: #2997ff; emissive: #2997ff; emissiveIntensity: 0.15; opacity: 0.2; transparent: true">
        </a-box>
        <!-- Platform edge glow — right -->
        <a-box position="14 0.01 -4" width="0.04" height="0.02" depth="20"
            material="color: #2997ff; emissive: #2997ff; emissiveIntensity: 0.15; opacity: 0.2; transparent: true">
        </a-box>

        <!-- Outer ambient floor -->
        <a-plane position="0 -0.02 -4" rotation="-90 0 0" width="80" height="80"
            material="color: #050507; metalness: 0.8; roughness: 0.5; opacity: 0.8; transparent: true; side: double">
        </a-plane>

        <!-- ==================== LIGHTING ==================== -->

        <!-- Global ambient — very dim -->
        <a-light type="ambient" intensity="0.2" color="#d4d8e0"></a-light>

        <!-- Soft directional fill from above -->
        <a-light type="directional" intensity="0.25" position="0 20 5" color="#e0e4ea"></a-light>

        <!-- SPOTLIGHT: Central chart (barsmap) — warm white -->
        <a-light type="spot" intensity="1.2" color="#f5f0e8" position="0 10 -5"
            target="#chart-barsmap" angle="35" penumbra="0.6" distance="18" decay="1.5">
        </a-light>

        <!-- SPOTLIGHT: Left chart (pie) — neutral white -->
        <a-light type="spot" intensity="1.0" color="#f0f0f0" position="-9 10 -6"
            target="#chart-pie" angle="30" penumbra="0.5" distance="16" decay="1.5">
        </a-light>

        <!-- SPOTLIGHT: Right chart (bars) — cool white -->
        <a-light type="spot" intensity="1.0" color="#e8f0f5" position="8 10 -6"
            target="#chart-bars" angle="30" penumbra="0.5" distance="16" decay="1.5">
        </a-light>

        <!-- Subtle floor reflection light -->
        <a-light type="point" intensity="0.08" position="0 0.5 -4" color="#2997ff" distance="15"></a-light>

        <!-- ==================== DATA SOURCES (BabiaXR) ==================== -->

        <a-entity id="sales-data" babia-queryjson="url: ../data/demo/sales.json"></a-entity>
        <a-entity id="attendance-data" babia-queryjson="url: ../data/demo/attendance.json"></a-entity>
        <a-entity id="kpis-data" babia-queryjson="url: ../data/demo/kpis.json"></a-entity>

        <!-- ==================== CHARTS (Interactive Wrappers) ==================== -->

        <!-- CENTRAL: 3D Bars Map — Sales by Department & Quarter -->
        <a-entity id="chart-barsmap-wrapper"
            position="0 0 -5"
            hoverable grabbable stretchable draggable
            hover-glow
            grab-visual
            chart-sync="syncId: barsmap"
            ownership-lock>
            <!-- Invisible hitbox for raycaster collision -->
            <a-box class="sh-hitbox" position="0 2 0"
                width="6" height="5" depth="6"
                material="opacity: 0; transparent: true; side: double"></a-box>
            <a-entity id="chart-barsmap"
                babia-barsmap="from: sales-data; legend: true; palette: bussiness; x_axis: department; z_axis: quarter; height: sales"
                scale="0.6 0.6 0.6"
                animation="property: scale; from: 0 0 0; to: 0.6 0.6 0.6; dur: 1200; easing: easeOutElastic; delay: 400">
            </a-entity>
        </a-entity>

        <!-- LEFT: Pie Chart — Attendance Distribution -->
        <a-entity id="chart-pie-wrapper"
            position="-9 2.5 -6"
            hoverable grabbable stretchable draggable
            hover-glow
            grab-visual
            chart-sync="syncId: pie"
            ownership-lock>
            <a-box class="sh-hitbox" position="0 0 0"
                width="4" height="3" depth="4"
                material="opacity: 0; transparent: true; side: double"></a-box>
            <a-entity id="chart-pie"
                babia-pie="from: attendance-data; legend: true; palette: sunset; key: event; size: attendees"
                rotation="90 0 0" scale="1.5 1.5 1.5"
                animation="property: scale; from: 0 0 0; to: 1.5 1.5 1.5; dur: 1000; easing: easeOutElastic; delay: 700">
            </a-entity>
        </a-entity>

        <!-- RIGHT: Simple Bars — Monthly KPIs -->
        <a-entity id="chart-bars-wrapper"
            position="8 0 -6"
            hoverable grabbable stretchable draggable
            hover-glow
            grab-visual
            chart-sync="syncId: bars"
            ownership-lock>
            <a-box class="sh-hitbox" position="0 2 0"
                width="5" height="5" depth="4"
                material="opacity: 0; transparent: true; side: double"></a-box>
            <a-entity id="chart-bars"
                babia-bars="from: kpis-data; legend: true; palette: blues; x_axis: month; height: revenue"
                scale="0.015 0.015 0.015"
                animation="property: scale; from: 0 0 0; to: 0.015 0.015 0.015; dur: 1000; easing: easeOutElastic; delay: 1000">
            </a-entity>
        </a-entity>

        <!-- ==================== LABELS 3D — Clean Floating ==================== -->

        <!-- Main title — discrete, ethereal -->
        <a-text value="Data Analytics" position="0 6.2 -13"
            align="center" color="#f5f5f7" width="14"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            opacity="0.25">
        </a-text>
        <a-text value="Collaborative Dashboard" position="0 5.7 -13"
            align="center" color="#a1a1a6" width="8"
            opacity="0.15">
        </a-text>

        <!-- Central chart label -->
        <a-text value="Sales by Department" position="0 4.2 -5"
            align="center" color="#f5f5f7" width="5"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            opacity="0.7">
        </a-text>
        <a-text value="Quarterly Comparison" position="0 3.85 -5"
            align="center" color="#a1a1a6" width="3.5"
            opacity="0.4">
        </a-text>

        <!-- Left chart label -->
        <a-text value="Meeting Attendance" position="-9 5 -6"
            align="center" color="#f5f5f7" width="4.5"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            opacity="0.7">
        </a-text>
        <a-text value="Event Distribution" position="-9 4.65 -6"
            align="center" color="#a1a1a6" width="3"
            opacity="0.4">
        </a-text>

        <!-- Right chart label -->
        <a-text value="Monthly Revenue" position="8 4.2 -6"
            align="center" color="#f5f5f7" width="4.5"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            opacity="0.7">
        </a-text>
        <a-text value="Fiscal Year 2026" position="8 3.85 -6"
            align="center" color="#a1a1a6" width="3"
            opacity="0.4">
        </a-text>

        <!-- ==================== METRIC CARDS — Interactive ==================== -->

        <!-- Metric Card: Central (Sales Total) -->
        <a-entity id="metric-sales" position="3.5 3.2 -3.5"
            hoverable grabbable
            hover-glow
            grab-visual
            chart-sync="syncId: metric-sales"
            ownership-lock
            animation="property: position; to: 3.5 3.4 -3.5; dir: alternate; dur: 4000; easing: easeInOutSine; loop: true">
            <a-box class="sh-hitbox" width="1.8" height="0.8" depth="0.1"
                material="opacity: 0; transparent: true; side: double"></a-box>
            <a-plane width="1.6" height="0.65"
                material="color: #0a0a0c; opacity: 0.85; transparent: true; side: double"
                geometry="primitive: plane; width: 1.6; height: 0.65">
            </a-plane>
            <a-plane width="1.6" height="0.65"
                material="color: #2997ff; opacity: 0.06; transparent: true; side: double">
            </a-plane>
            <!-- Border effect -->
            <a-plane width="1.62" height="0.67" position="0 0 -0.001"
                material="color: #2997ff; opacity: 0.12; transparent: true; side: double">
            </a-plane>
            <a-text value="Total Sales" position="0 0.12 0.01"
                align="center" color="#a1a1a6" width="2" opacity="0.7">
            </a-text>
            <a-text id="metric-sales-value" value="3,608" position="0 -0.1 0.01"
                align="center" color="#f5f5f7" width="3"
                font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.9">
            </a-text>
        </a-entity>

        <!-- Metric Card: Left (Attendance Total) -->
        <a-entity id="metric-attendance" position="-7 4.2 -4.5"
            hoverable grabbable
            hover-glow
            grab-visual
            chart-sync="syncId: metric-attendance"
            ownership-lock
            animation="property: position; to: -7 4.4 -4.5; dir: alternate; dur: 3500; easing: easeInOutSine; loop: true">
            <a-box class="sh-hitbox" width="1.7" height="0.8" depth="0.1"
                material="opacity: 0; transparent: true; side: double"></a-box>
            <a-plane width="1.5" height="0.65"
                material="color: #0a0a0c; opacity: 0.85; transparent: true; side: double">
            </a-plane>
            <a-plane width="1.5" height="0.65"
                material="color: #2997ff; opacity: 0.06; transparent: true; side: double">
            </a-plane>
            <a-plane width="1.52" height="0.67" position="0 0 -0.001"
                material="color: #2997ff; opacity: 0.12; transparent: true; side: double">
            </a-plane>
            <a-text value="Total Attendees" position="0 0.12 0.01"
                align="center" color="#a1a1a6" width="2" opacity="0.7">
            </a-text>
            <a-text id="metric-attendance-value" value="318" position="0 -0.1 0.01"
                align="center" color="#f5f5f7" width="3"
                font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.9">
            </a-text>
        </a-entity>

        <!-- Metric Card: Right (Revenue YTD) -->
        <a-entity id="metric-revenue" position="10 3.2 -4.5"
            hoverable grabbable
            hover-glow
            grab-visual
            chart-sync="syncId: metric-revenue"
            ownership-lock
            animation="property: position; to: 10 3.4 -4.5; dir: alternate; dur: 4500; easing: easeInOutSine; loop: true">
            <a-box class="sh-hitbox" width="1.8" height="0.8" depth="0.1"
                material="opacity: 0; transparent: true; side: double"></a-box>
            <a-plane width="1.6" height="0.65"
                material="color: #0a0a0c; opacity: 0.85; transparent: true; side: double">
            </a-plane>
            <a-plane width="1.6" height="0.65"
                material="color: #2997ff; opacity: 0.06; transparent: true; side: double">
            </a-plane>
            <a-plane width="1.62" height="0.67" position="0 0 -0.001"
                material="color: #2997ff; opacity: 0.12; transparent: true; side: double">
            </a-plane>
            <a-text value="YTD Revenue" position="0 0.12 0.01"
                align="center" color="#a1a1a6" width="2" opacity="0.7">
            </a-text>
            <a-text id="metric-revenue-value" value="$1.25M" position="0 -0.1 0.01"
                align="center" color="#f5f5f7" width="3"
                font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.9">
            </a-text>
        </a-entity>

        <!-- ==================== 3D CLOCK ==================== -->
        <a-entity id="scene-clock" position="12 5.5 -13" clock-display>
            <a-text id="clock-time" value="--:--" align="right" color="#f5f5f7" width="4"
                font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.35">
            </a-text>
            <a-text id="clock-date" value="" position="0 -0.35 0" align="right" color="#a1a1a6" width="2.5"
                opacity="0.2">
            </a-text>
        </a-entity>

        <!-- ==================== PLAYER RIG ==================== -->
        <a-entity id="rig" networked="template:#avatar-template;attachTemplateToLocal:false;"
            position="0 0 5" spawn-in-circle="radius:3" player-info
            pointer-sync>

            <a-entity id="player" class="player-cam" camera position="0 1.6 0"
                wasd-controls="fly: true"
                look-controls="pointerLockEnabled: false">
                <!-- Desktop cursor (unchanged) -->
                <a-cursor raycaster="objects: .babia-bar, .babia-slice, .babia-cyl" color="#2997ff" fuse="false"></a-cursor>
                <a-sphere class="head" visible="false" random-color></a-sphere>
                <a-text class="nametag" visible="false"></a-text>
            </a-entity>

            <!-- ══════ VR CONTROLLERS — Superhands + Laser Pointer ══════ -->

            <!-- Left Controller: Locomotion (thumbstick) + Grab (trigger/grip) -->
            <a-entity id="left-controller"
                laser-controls="hand: left; model: true"
                raycaster="objects: .sh-hitbox, .babia-bar, .babia-slice, .babia-cyl; far: 15; showLine: true; lineColor: #2997ff; lineOpacity: 0.35"
                super-hands="colliderEvent: raycaster-intersection;
                             colliderEventProperty: els;
                             colliderEndEvent: raycaster-intersection-cleared;
                             colliderEndEventProperty: clearedEls;
                             grabStartButtons: triggerdown,gripdown;
                             grabEndButtons: triggerup,gripup;
                             stretchStartButtons: triggerdown,gripdown;
                             stretchEndButtons: triggerup,gripup;
                             dragDropStartButtons: triggerdown,gripdown;
                             dragDropEndButtons: triggerup,gripup"
                thumbstick-move="speed: 2.5">
            </a-entity>

            <!-- Right Controller: Snap Turn (thumbstick) + Grab (trigger/grip) -->
            <a-entity id="right-controller"
                laser-controls="hand: right; model: true"
                raycaster="objects: .sh-hitbox, .babia-bar, .babia-slice, .babia-cyl; far: 15; showLine: true; lineColor: #2997ff; lineOpacity: 0.35"
                super-hands="colliderEvent: raycaster-intersection;
                             colliderEventProperty: els;
                             colliderEndEvent: raycaster-intersection-cleared;
                             colliderEndEventProperty: clearedEls;
                             grabStartButtons: triggerdown,gripdown;
                             grabEndButtons: triggerup,gripup;
                             stretchStartButtons: triggerdown,gripdown;
                             stretchEndButtons: triggerup,gripup;
                             dragDropStartButtons: triggerdown,gripdown;
                             dragDropEndButtons: triggerup,gripup"
                thumbstick-turn="snapAngle: 45">
            </a-entity>

            <!-- ══════ HAND TRACKING FALLBACK (Quest 3 bare hands) ══════ -->

            <a-entity id="left-hand-tracking"
                hand-tracking-controls="hand: left; modelColor: #2997ff; modelOpacity: 0.3"
                sphere-collider="objects: .sh-hitbox; radius: 0.04"
                super-hands>
            </a-entity>

            <a-entity id="right-hand-tracking"
                hand-tracking-controls="hand: right; modelColor: #2997ff; modelOpacity: 0.3"
                sphere-collider="objects: .sh-hitbox; radius: 0.04"
                super-hands>
            </a-entity>

        </a-entity>

    </a-scene>

    <!-- Scene logic -->
    <script src="../js/worlds/babia/babia-scene.js"></script>

</body>

</html>
