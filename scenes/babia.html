<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Data Visualization Room — Collaborative VR</title>
    <meta name="description" content="Immersive 3D data visualization for collaborative meetings in VR">
    <link rel="icon" type="image/png" href="../assets/images/MiLogoVR.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- A-Frame & extensions -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- WORKAROUND: Remove built-in A-Frame 1.5+ grabbable to avoid
         conflict with superhands' grabbable component -->
    <script>delete AFRAME.components["grabbable"];</script>

    <!-- Networking -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <script src="/easyrtc/easyrtc.js"></script>
    <script src="/js/networked-aframe.js"></script>
    <script src="/js/easyrtc-patch.js"></script>

    <!-- BabiaXR -->
    <script src="https://unpkg.com/aframe-babia-components/dist/aframe-babia-components.min.js"></script>

    <!-- A-Frame extras (sphere-collider, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <!-- Superhands — Natural VR interaction -->
    <script src="https://unpkg.com/super-hands@^3.0.6/dist/super-hands.min.js"></script>

    <link rel="stylesheet" href="../css/babia.css">
</head>

<body>

    <!-- ══════════════════════════════════════════
         DATASET INFO PANEL (HUD — top left)
         ══════════════════════════════════════════ -->
    <div id="dataset-panel">
        <div class="dataset-header">
            <div class="dataset-dot"></div>
            <span class="dataset-label">Active Dataset</span>
        </div>
        <h3 id="dataset-title">Quarterly Sales Overview</h3>
        <p id="dataset-desc">Comparative sales data by department across Q1–Q4. Explore the 3D bar chart to compare performance.</p>
    </div>

    <!-- ══════════════════════════════════════════
         SESSION BADGE (HUD — top right)
         ══════════════════════════════════════════ -->
    <div id="session-badge">
        <div class="badge-time" id="badge-time">--:--</div>
        <div class="badge-date" id="badge-date">Loading...</div>
        <div class="badge-session">
            <span class="session-dot"></span>
            Session: <span id="badge-session">0:00</span>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         PRESET DOCK (HUD — bottom center)
         ══════════════════════════════════════════ -->
    <div id="preset-dock">
        <button class="dock-item active" data-preset="sales">
            <span class="dock-icon">📊</span>
            <span class="dock-label">Sales</span>
        </button>
        <button class="dock-item" data-preset="attendance">
            <span class="dock-icon">👥</span>
            <span class="dock-label">Attendance</span>
        </button>
        <button class="dock-item" data-preset="kpis">
            <span class="dock-icon">💰</span>
            <span class="dock-label">KPIs</span>
        </button>
    </div>

    <!-- ══════════════════════════════════════════
         A-FRAME SCENE
         ══════════════════════════════════════════ -->
    <a-scene networked-scene="
        room: babia-data-room;
        debug: true;
        adapter: easyrtc;
        audio: true;
        serverURL: /;
    ">

        <a-assets>
            <!-- Avatar template -->
            <template id="avatar-template">
                <a-entity class="avatar">
                    <a-entity class="player-cam" networked-audio-source>
                        <a-entity class="visual-model"
                            animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true; to: 0 0.1 0">
                            <a-sphere class="head" scale="0.3 0.3 0.3"></a-sphere>
                            <a-entity class="face" position="0 0.05 0">
                                <a-sphere class="eye" color="#efefef" position="0.1 0.1 -0.2"
                                    scale="0.08 0.08 0.08">
                                    <a-sphere class="pupil" color="#000" position="0 0 -1"
                                        scale="0.2 0.2 0.2"></a-sphere>
                                </a-sphere>
                                <a-sphere class="eye" color="#efefef" position="-0.1 0.1 -0.2"
                                    scale="0.08 0.08 0.08">
                                    <a-sphere class="pupil" color="#000" position="0 0 -1"
                                        scale="0.2 0.2 0.2"></a-sphere>
                                </a-sphere>
                            </a-entity>
                        </a-entity>
                        <a-entity class="nametag-container" position="0 0.6 0" look-at="[camera]">
                            <a-text class="nametag" value="Anonymous" color="white" align="center"
                                scale="1.5 1.5 1.5" side="double"></a-text>
                        </a-entity>
                    </a-entity>
                </a-entity>
            </template>
        </a-assets>

        <!-- ==================== ENVIRONMENT ==================== -->

        <!-- ==================== ENVIRONMENT & ARCHITECTURE ==================== -->

        <!-- Sky & Infinite Floor -->
        <a-sky color="#F5F5F7"></a-sky>
        <a-plane position="0 -0.02 0" rotation="-90 0 0" width="200" height="200"
            material="shader: flat; color: #F5F5F7; opacity: 1; transparent: false; side: double">
        </a-plane>

        <!-- The Agora (Central Platform) -->
        <a-cylinder position="0 -0.01 0" radius="18" height="0.02" material="color: #ffffff; roughness: 0.9; metalness: 0"></a-cylinder>
        <a-ring position="0 0 0" rotation="-90 0 0" radius-inner="17.8" radius-outer="18.2" material="color: #4338CA; opacity: 0.1"></a-ring>



        <!-- ==================== LIGHTING ==================== -->

        <!-- Bright Ambient Studio Light -->
        <a-light type="ambient" intensity="0.85" color="#ffffff"></a-light>
        <a-light type="directional" intensity="0.4" position="5 20 10" color="#ffffff" castShadow="false"></a-light>

        <!-- Highlight Spots for the 3 Exhibits -->
        <a-light type="spot" intensity="0.6" color="#ffffff" position="0 12 -12" target="#exhibit-sales" angle="35" penumbra="1" distance="20" decay="1.2"></a-light>
        <a-light type="spot" intensity="0.6" color="#ffffff" position="-10.4 12 6" target="#exhibit-attendance" angle="35" penumbra="1" distance="20" decay="1.2"></a-light>
        <a-light type="spot" intensity="0.6" color="#ffffff" position="10.4 12 6" target="#exhibit-kpis" angle="35" penumbra="1" distance="20" decay="1.2"></a-light>

        <!-- ==================== DATA SOURCES ==================== -->
        <a-entity id="sales-data" babia-queryjson="url: ../data/demo/sales.json"></a-entity>
        <a-entity id="attendance-data" babia-queryjson="url: ../data/demo/attendance.json"></a-entity>
        <a-entity id="kpis-data" babia-queryjson="url: ../data/demo/kpis.json"></a-entity>

        <!-- ==================== EXHIBIT 1: SALES ==================== -->
        <a-entity id="exhibit-sales" position="0 0 -12">
            <!-- Pedestal -->
            <a-cylinder position="0 0.4 0" radius="3" height="0.8" material="color: #ffffff; opacity: 0.95"></a-cylinder>
            <a-cylinder position="0 0.81 0" radius="2.8" height="0.02" material="color: #4338CA; opacity: 0.15; transparent: true"></a-cylinder>
            
            <!-- Floating Labels -->
            <a-text value="Sales by Department" position="0 1.2 3.2" rotation="-15 0 0" align="center" color="#1D1D1F" width="5" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.9"></a-text>
            <a-text value="Quarterly Comparison" position="0 0.95 3.2" rotation="-15 0 0" align="center" color="#6E6E73" width="3.5" opacity="0.8"></a-text>

            <!-- Chart -->
            <a-entity id="chart-barsmap-wrapper" position="0 0.82 0" hoverable grabbable stretchable draggable hover-glow grab-visual chart-sync="syncId: barsmap" ownership-lock>
                <a-box class="sh-hitbox" position="0 -0.25 0" width="6.5" height="0.5" depth="6.5" material="opacity: 0; transparent: true; side: double"></a-box>
                <a-entity id="chart-barsmap" babia-barsmap="from: sales-data; legend: true; palette: bussiness; x_axis: department; z_axis: quarter; height: sales" scale="0.6 0.6 0.6" animation="property: scale; from: 0 0 0; to: 0.6 0.6 0.6; dur: 1200; easing: easeOutElastic; delay: 400"></a-entity>
            </a-entity>

            <!-- Metric Plaque -->
            <a-entity id="metric-sales" position="0 0.4 3.01" hoverable grabbable hover-glow grab-visual chart-sync="syncId: metric-sales" ownership-lock animation="property: position; to: 0 0.42 3.01; dir: alternate; dur: 4000; easing: easeInOutSine; loop: true">
                <a-box class="sh-hitbox" width="1.8" height="0.8" depth="0.1" material="opacity: 0; transparent: true; side: double"></a-box>
                <a-plane width="1.6" height="0.65" material="color: #ffffff; opacity: 0.85; transparent: true" geometry="primitive: plane; width: 1.6; height: 0.65"></a-plane>
                <a-plane width="1.62" height="0.67" position="0 0 -0.001" material="color: #4338CA; opacity: 0.2; transparent: true"></a-plane>
                <a-text value="Total Sales" position="0 0.12 0.01" align="center" color="#6E6E73" width="2"></a-text>
                <a-text id="metric-sales-value" value="3,608" position="0 -0.1 0.01" align="center" color="#1D1D1F" width="3" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
            </a-entity>
        </a-entity>

        <!-- ==================== EXHIBIT 2: ATTENDANCE (Rotated 120 deg) ==================== -->
        <a-entity id="exhibit-attendance" position="-10.4 0 6" rotation="0 120 0">
            <!-- Pedestal -->
            <a-cylinder position="0 0.4 0" radius="2.5" height="0.8" material="color: #ffffff; opacity: 0.95"></a-cylinder>
            <a-cylinder position="0 0.81 0" radius="2.3" height="0.02" material="color: #4338CA; opacity: 0.15; transparent: true"></a-cylinder>
            
            <!-- Floating Labels -->
            <a-text value="Meeting Attendance" position="0 1.2 2.7" rotation="-15 0 0" align="center" color="#1D1D1F" width="5" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.9"></a-text>
            <a-text value="Event Distribution" position="0 0.95 2.7" rotation="-15 0 0" align="center" color="#6E6E73" width="3.5" opacity="0.8"></a-text>

            <!-- Chart (pie is larger, placed slightly higher if needed) -->
            <a-entity id="chart-pie-wrapper" position="0 2.3 0" hoverable grabbable stretchable draggable hover-glow grab-visual chart-sync="syncId: pie" ownership-lock>
                <!-- Because pie chart is vertically rotated locally, we place handle below it -->
                <a-box class="sh-hitbox" position="0 -1.8 0" width="4.5" height="0.5" depth="4.5" material="opacity: 0; transparent: true; side: double"></a-box>
                <a-entity id="chart-pie" babia-pie="from: attendance-data; legend: true; palette: sunset; key: event; size: attendees" rotation="90 0 0" scale="1.5 1.5 1.5" animation="property: scale; from: 0 0 0; to: 1.5 1.5 1.5; dur: 1000; easing: easeOutElastic; delay: 700"></a-entity>
            </a-entity>

            <!-- Metric Plaque -->
            <a-entity id="metric-attendance" position="0 0.4 2.51" hoverable grabbable hover-glow grab-visual chart-sync="syncId: metric-attendance" ownership-lock animation="property: position; to: 0 0.42 2.51; dir: alternate; dur: 3500; easing: easeInOutSine; loop: true">
                <a-box class="sh-hitbox" width="1.7" height="0.8" depth="0.1" material="opacity: 0; transparent: true; side: double"></a-box>
                <a-plane width="1.5" height="0.65" material="color: #ffffff; opacity: 0.85; transparent: true"></a-plane>
                <a-plane width="1.52" height="0.67" position="0 0 -0.001" material="color: #4338CA; opacity: 0.2; transparent: true"></a-plane>
                <a-text value="Total Attendees" position="0 0.12 0.01" align="center" color="#6E6E73" width="2"></a-text>
                <a-text id="metric-attendance-value" value="318" position="0 -0.1 0.01" align="center" color="#1D1D1F" width="3" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
            </a-entity>
        </a-entity>

        <!-- ==================== EXHIBIT 3: KPIs (Rotated -120 deg) ==================== -->
        <a-entity id="exhibit-kpis" position="10.4 0 6" rotation="0 -120 0">
            <!-- Pedestal -->
            <a-cylinder position="0 0.4 0" radius="2.5" height="0.8" material="color: #ffffff; opacity: 0.95"></a-cylinder>
            <a-cylinder position="0 0.81 0" radius="2.3" height="0.02" material="color: #4338CA; opacity: 0.15; transparent: true"></a-cylinder>
            
            <!-- Floating Labels -->
            <a-text value="Monthly KPIs" position="0 1.2 2.7" rotation="-15 0 0" align="center" color="#1D1D1F" width="5" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.9"></a-text>
            <a-text value="Revenue Track" position="0 0.95 2.7" rotation="-15 0 0" align="center" color="#6E6E73" width="3.5" opacity="0.8"></a-text>

            <!-- Chart -->
            <a-entity id="chart-bars-wrapper" position="0 0.82 0" hoverable grabbable stretchable draggable hover-glow grab-visual chart-sync="syncId: bars" ownership-lock>
                <a-box class="sh-hitbox" position="0 -0.25 0" width="5.5" height="0.5" depth="4.5" material="opacity: 0; transparent: true; side: double"></a-box>
                <a-entity id="chart-bars" babia-bars="from: kpis-data; legend: true; palette: blues; x_axis: month; height: revenue" scale="0.015 0.015 0.015" animation="property: scale; from: 0 0 0; to: 0.015 0.015 0.015; dur: 1000; easing: easeOutElastic; delay: 1000"></a-entity>
            </a-entity>

            <!-- Metric Plaque -->
            <a-entity id="metric-revenue" position="0 0.4 2.51" hoverable grabbable hover-glow grab-visual chart-sync="syncId: metric-revenue" ownership-lock animation="property: position; to: 0 0.42 2.51; dir: alternate; dur: 4500; easing: easeInOutSine; loop: true">
                <a-box class="sh-hitbox" width="1.8" height="0.8" depth="0.1" material="opacity: 0; transparent: true; side: double"></a-box>
                <a-plane width="1.6" height="0.65" material="color: #ffffff; opacity: 0.85; transparent: true"></a-plane>
                <a-plane width="1.62" height="0.67" position="0 0 -0.001" material="color: #4338CA; opacity: 0.2; transparent: true"></a-plane>
                <a-text value="YTD Revenue" position="0 0.12 0.01" align="center" color="#6E6E73" width="2"></a-text>
                <a-text id="metric-revenue-value" value="$1.25M" position="0 -0.1 0.01" align="center" color="#1D1D1F" width="3" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
            </a-entity>
        </a-entity>

        <!-- ==================== 3D CLOCK & WELCOME ==================== -->
        <a-entity id="scene-clock" position="0 6 -12" clock-display>
            <a-text value="The Analytics Pavilion" position="0 0.9 0" align="center" color="#1D1D1F" width="10" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.8"></a-text>
            <a-text id="clock-time" value="--:--" position="0 0.3 0" align="center" color="#4338CA" width="9" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.9"></a-text>
            <a-text id="clock-date" value="" position="0 -0.3 0" align="center" color="#6E6E73" width="5" opacity="0.8"></a-text>
        </a-entity>


        <!-- ==================== PLAYER RIG ==================== -->
        <a-entity id="rig" networked="template:#avatar-template;attachTemplateToLocal:false;"
            position="0 0 5" spawn-in-circle="radius:3" player-info
            pointer-sync>

            <a-entity id="player" class="player-cam" camera position="0 1.6 0"
                wasd-controls="fly: true"
                look-controls="pointerLockEnabled: false">
                <!-- Desktop cursor (unchanged) -->
                <a-cursor raycaster="objects: .babia-bar, .babia-slice, .babia-cyl" color="#2997ff" fuse="false"></a-cursor>
                <a-sphere class="head" visible="false" random-color></a-sphere>
                <a-text class="nametag" visible="false"></a-text>
            </a-entity>

            <!-- ══════ VR CONTROLLERS — Superhands + Laser Pointer ══════ -->

            <!-- Left Controller: Locomotion (thumbstick) + Grab (trigger/grip) -->
            <a-entity id="left-controller"
                laser-controls="hand: left; model: true"
                cursor="fuse: false; rayOrigin: entity;"
                raycaster="objects: .sh-hitbox, .babia-bar, .babia-slice, .babia-cyl; far: 15; showLine: true; lineColor: #2997ff; lineOpacity: 0.35"
                super-hands="colliderEvent: raycaster-intersection;
                             colliderEventProperty: els;
                             colliderEndEvent: raycaster-intersection-cleared;
                             colliderEndEventProperty: clearedEls;
                             grabStartButtons: selectstart,triggerdown,gripdown;
                             grabEndButtons: selectend,triggerup,gripup;
                             stretchStartButtons: selectstart,triggerdown,gripdown;
                             stretchEndButtons: selectend,triggerup,gripup;
                             dragDropStartButtons: selectstart,triggerdown,gripdown;
                             dragDropEndButtons: selectend,triggerup,gripup"
                thumbstick-move="speed: 2.5">
            </a-entity>

            <!-- Right Controller: Snap Turn (thumbstick) + Grab (trigger/grip) -->
            <a-entity id="right-controller"
                laser-controls="hand: right; model: true"
                cursor="fuse: false; rayOrigin: entity;"
                raycaster="objects: .sh-hitbox, .babia-bar, .babia-slice, .babia-cyl; far: 15; showLine: true; lineColor: #2997ff; lineOpacity: 0.35"
                super-hands="colliderEvent: raycaster-intersection;
                             colliderEventProperty: els;
                             colliderEndEvent: raycaster-intersection-cleared;
                             colliderEndEventProperty: clearedEls;
                             grabStartButtons: selectstart,triggerdown,gripdown;
                             grabEndButtons: selectend,triggerup,gripup;
                             stretchStartButtons: selectstart,triggerdown,gripdown;
                             stretchEndButtons: selectend,triggerup,gripup;
                             dragDropStartButtons: selectstart,triggerdown,gripdown;
                             dragDropEndButtons: selectend,triggerup,gripup"
                thumbstick-turn="snapAngle: 45">
            </a-entity>

            <!-- ══════ HAND TRACKING FALLBACK (Quest 3 bare hands) ══════ -->

            <a-entity id="left-hand-tracking"
                hand-tracking-controls="hand: left; modelColor: #2997ff; modelOpacity: 0.3"
                sphere-collider="objects: .sh-hitbox; radius: 0.04"
                super-hands>
            </a-entity>

            <a-entity id="right-hand-tracking"
                hand-tracking-controls="hand: right; modelColor: #2997ff; modelOpacity: 0.3"
                sphere-collider="objects: .sh-hitbox; radius: 0.04"
                super-hands>
            </a-entity>

        </a-entity>

    </a-scene>

    <!-- Scene logic -->
    <script src="../js/worlds/babia/babia-scene.js"></script>

</body>

</html>
