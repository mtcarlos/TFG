<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Data Visualization Room — Collaborative VR</title>
    <meta name="description" content="Immersive 3D data visualization for collaborative meetings in VR">
    <link rel="icon" type="image/png" href="../assets/images/MiLogoVR.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- A-Frame & extensions -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <script src="/easyrtc/easyrtc.js"></script>
    <script src="/js/networked-aframe.js"></script>
    <script src="/js/easyrtc-patch.js"></script>

    <!-- BabiaXR -->
    <script src="https://unpkg.com/aframe-babia-components/dist/aframe-babia-components.min.js"></script>

    <!-- A-Frame extras -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <link rel="stylesheet" href="../css/babia.css">
</head>

<body>


    <!-- ======================================================
         DATASET INFO PANEL (HUD)
         ====================================================== -->
    <div id="dataset-panel">
        <div class="dataset-header">
            <div class="dataset-dot"></div>
            <span class="dataset-label">Active Dataset</span>
        </div>
        <h3 id="dataset-title">Quarterly Sales Overview</h3>
        <p id="dataset-desc">Comparative sales data by department across Q1–Q4. Explore the 3D bar chart to compare performance.</p>
    </div>

    <!-- ======================================================
         PRESET SELECTOR (HUD)
         ====================================================== -->
    <div id="preset-selector">
        <button class="preset-btn active" data-preset="sales">📊 Sales</button>
        <button class="preset-btn" data-preset="attendance">👥 Attendance</button>
        <button class="preset-btn" data-preset="kpis">💰 KPIs</button>
    </div>

    <!-- ======================================================
         A-FRAME SCENE
         ====================================================== -->
    <a-scene networked-scene="
        room: babia-data-room;
        debug: true;
        adapter: easyrtc;
        audio: true;
        serverURL: /;
    ">

        <a-assets>
            <!-- Avatar template (reused from build world) -->
            <template id="avatar-template">
                <a-entity class="avatar">
                    <a-entity class="player-cam" networked-audio-source>
                        <a-entity class="visual-model"
                            animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true; to: 0 0.1 0">
                            <a-sphere class="head" scale="0.3 0.3 0.3"></a-sphere>
                            <a-entity class="face" position="0 0.05 0">
                                <a-sphere class="eye" color="#efefef" position="0.1 0.1 -0.2" scale="0.08 0.08 0.08">
                                    <a-sphere class="pupil" color="#000" position="0 0 -1" scale="0.2 0.2 0.2"></a-sphere>
                                </a-sphere>
                                <a-sphere class="eye" color="#efefef" position="-0.1 0.1 -0.2" scale="0.08 0.08 0.08">
                                    <a-sphere class="pupil" color="#000" position="0 0 -1" scale="0.2 0.2 0.2"></a-sphere>
                                </a-sphere>
                            </a-entity>
                        </a-entity>
                        <a-entity class="nametag-container" position="0 0.6 0" look-at="[camera]">
                            <a-text class="nametag" value="Anonymous" color="white" align="center"
                                scale="1.5 1.5 1.5" side="double"></a-text>
                        </a-entity>
                    </a-entity>
                </a-entity>
            </template>
        </a-assets>

        <!-- ==================== ENVIRONMENT ==================== -->

        <!-- Floor: dark reflective platform -->
        <a-circle rotation="-90 0 0" radius="30" color="#0d1117"
            material="metalness: 0.9; roughness: 0.3; color: #0d1117"
            position="0 0 0"></a-circle>

        <!-- Outer floor ring for depth -->
        <a-ring rotation="-90 0 0" radius-inner="30" radius-outer="60"
            material="color: #080b10; metalness: 0.8; roughness: 0.5; opacity: 0.6; transparent: true"
            position="0 -0.01 0"></a-ring>

        <!-- Skybox: dark gradient dome -->
        <a-sky color="#060810"></a-sky>

        <!-- Ambient grid lines on floor -->
        <a-entity position="0 0.01 0" rotation="-90 0 0"
            geometry="primitive: plane; width: 60; height: 60"
            material="src: #grid-tex; repeat: 30 30; transparent: true; opacity: 0.08; color: #3b82f6; side: double">
        </a-entity>

        <!-- Lighting -->
        <a-light type="ambient" intensity="0.6" color="#c8d6e5"></a-light>
        <a-light type="directional" intensity="0.7" position="5 15 10" color="#e0e8ff"></a-light>
        <a-light type="point" intensity="0.4" position="0 6 0" color="#3b82f6" distance="25"></a-light>
        <a-light type="point" intensity="0.2" position="-10 4 -5" color="#06b6d4" distance="20"></a-light>
        <a-light type="point" intensity="0.2" position="10 4 -5" color="#8b5cf6" distance="20"></a-light>

        <!-- ==================== DECORATION ==================== -->

        <!-- Central platform ring -->
        <a-torus position="0 0.02 -5" rotation="90 0 0"
            radius="5" radius-tubular="0.03"
            material="color: #1e3a5f; emissive: #1e3a5f; emissiveIntensity: 0.3; opacity: 0.5; transparent: true">
        </a-torus>

        <!-- Vertical accent pillars -->
        <a-cylinder position="-8 2.5 -10" radius="0.08" height="5"
            material="color: #1e293b; emissive: #3b82f6; emissiveIntensity: 0.2; metalness: 0.9; roughness: 0.2">
        </a-cylinder>
        <a-cylinder position="8 2.5 -10" radius="0.08" height="5"
            material="color: #1e293b; emissive: #3b82f6; emissiveIntensity: 0.2; metalness: 0.9; roughness: 0.2">
        </a-cylinder>

        <!-- Subtle floating particles -->
        <a-sphere position="-3 3 -8" radius="0.05" material="color: #3b82f6; emissive: #3b82f6; emissiveIntensity: 0.8; opacity: 0.6; transparent: true"
            animation="property: position; to: -3 4 -8; dir: alternate; dur: 3000; easing: easeInOutSine; loop: true">
        </a-sphere>
        <a-sphere position="4 2.5 -6" radius="0.04" material="color: #06b6d4; emissive: #06b6d4; emissiveIntensity: 0.8; opacity: 0.5; transparent: true"
            animation="property: position; to: 4 3.5 -6; dir: alternate; dur: 4000; easing: easeInOutSine; loop: true">
        </a-sphere>
        <a-sphere position="0 4 -12" radius="0.06" material="color: #8b5cf6; emissive: #8b5cf6; emissiveIntensity: 0.8; opacity: 0.4; transparent: true"
            animation="property: position; to: 0 5 -12; dir: alternate; dur: 3500; easing: easeInOutSine; loop: true">
        </a-sphere>

        <!-- ==================== DATA SOURCES (BabiaXR) ==================== -->

        <!-- Sales dataset (for barsmap) -->
        <a-entity id="sales-data" babia-queryjson="url: ../data/demo/sales.json"></a-entity>

        <!-- Attendance dataset (for pie chart) -->
        <a-entity id="attendance-data" babia-queryjson="url: ../data/demo/attendance.json"></a-entity>

        <!-- KPIs dataset (for bars chart) -->
        <a-entity id="kpis-data" babia-queryjson="url: ../data/demo/kpis.json"></a-entity>

        <!-- ==================== CHARTS (BabiaXR) ==================== -->

        <!-- CENTRAL: 3D Bars Map — Sales by Department & Quarter -->
        <a-entity id="chart-barsmap"
            babia-barsmap="from: sales-data; legend: true; palette: bussiness; x_axis: department; z_axis: quarter; height: sales"
            position="0 0 -5" scale="0.6 0.6 0.6"
            animation="property: scale; from: 0 0 0; to: 0.6 0.6 0.6; dur: 1200; easing: easeOutElastic; delay: 500">
        </a-entity>

        <!-- LEFT: Pie Chart — Attendance Distribution -->
        <a-entity id="chart-pie"
            babia-pie="from: attendance-data; legend: true; palette: sunset; key: event; size: attendees"
            position="-9 2.5 -6" rotation="90 0 0" scale="1.5 1.5 1.5"
            animation="property: scale; from: 0 0 0; to: 1.5 1.5 1.5; dur: 1000; easing: easeOutElastic; delay: 800">
        </a-entity>

        <!-- RIGHT: Simple Bars — Monthly KPIs -->
        <a-entity id="chart-bars"
            babia-bars="from: kpis-data; legend: true; palette: blues; x_axis: month; height: revenue"
            position="8 0 -6" scale="0.015 0.015 0.015"
            animation="property: scale; from: 0 0 0; to: 0.015 0.015 0.015; dur: 1000; easing: easeOutElastic; delay: 1100">
        </a-entity>

        <!-- ==================== TEXT LABELS ==================== -->

        <!-- Main title -->
        <a-text value="Data Visualization Room" position="0 5.5 -12"
            align="center" color="#e2e8f0" width="12"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            opacity="0.9">
        </a-text>

        <!-- Central chart label -->
        <a-text value="Sales by Department" position="0 4 -5"
            align="center" color="#93c5fd" width="6"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            opacity="0.8">
        </a-text>
        <a-text value="Quarterly Comparison" position="0 3.6 -5"
            align="center" color="#64748b" width="4"
            opacity="0.6">
        </a-text>

        <!-- Left chart label -->
        <a-text value="Meeting Attendance" position="-9 4.8 -6"
            align="center" color="#fb923c" width="5"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            opacity="0.8">
        </a-text>

        <!-- Right chart label -->
        <a-text value="Monthly Revenue" position="8 4 -6"
            align="center" color="#60a5fa" width="5"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            opacity="0.8">
        </a-text>

        <!-- Welcome sign near spawn -->
        <a-entity position="0 2.5 3" rotation="0 180 0">
            <a-text value="Welcome to the Data Room" align="center" color="#f8fafc" width="8"
                font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" opacity="0.8">
            </a-text>
            <a-text value="Walk around the charts to explore data from every angle" align="center"
                color="#94a3b8" width="6" position="0 -0.4 0" opacity="0.6">
            </a-text>
            <a-text value="Use WASD to move · Hover charts for details" align="center"
                color="#64748b" width="5" position="0 -0.7 0" opacity="0.5">
            </a-text>
        </a-entity>

        <!-- ==================== PLAYER RIG ==================== -->
        <a-entity id="rig" networked="template:#avatar-template;attachTemplateToLocal:false;"
            position="0 0 5" spawn-in-circle="radius:3" player-info>

            <a-entity id="player" class="player-cam" camera position="0 1.6 0"
                wasd-controls="fly: true"
                look-controls="pointerLockEnabled: false">
                <a-cursor raycaster="objects: .babia-bar, .babia-slice, .babia-cyl" color="#06b6d4" fuse="false"></a-cursor>
                <a-sphere class="head" visible="false" random-color></a-sphere>
                <a-text class="nametag" visible="false"></a-text>
            </a-entity>

            <!-- VR Controllers -->
            <a-entity id="left-hand" laser-controls="hand: left"></a-entity>
            <a-entity id="right-hand" laser-controls="hand: right"></a-entity>
        </a-entity>

    </a-scene>

    <!-- Scene logic -->
    <script src="../js/worlds/babia/babia-scene.js"></script>

</body>

</html>
